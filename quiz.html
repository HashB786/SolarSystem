<!DOCTYPE html>
<!--
  quiz.html — Space Explorer Quiz Page
  Features: 10-question multiple-choice quiz, one question at a time,
            green/red answer feedback, animated progress bar,
            results screen with score, percentage, dynamic message,
            high score saved to localStorage. All logic in script.js.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Test your space knowledge with 10 cosmic questions. Can you score 100%?" />
  <title>Space Explorer — Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            space:   '#0a0a1a',
            primary: '#7c3aed',
            accent:  '#f59e0b',
          },
          fontFamily: {
            heading: ['Orbitron', 'sans-serif'],
            body:    ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-space font-body text-white min-h-screen">

  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- ======================================================
       NAVBAR
  ====================================================== -->
  <nav class="navbar-glass fixed top-0 left-0 right-0 z-20 px-4 md:px-8" aria-label="Main navigation">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16">

      <a href="index.html" class="font-heading font-black text-lg flex items-center gap-2" aria-label="Space Explorer — Home">
        <span class="text-2xl" aria-hidden="true">🚀</span>
        <span class="glow-accent">Space</span><span class="text-purple-400">Explorer</span>
      </a>

      <div class="hidden md:flex items-center gap-8">
        <a href="index.html"   class="font-heading text-sm text-gray-300 hover:text-purple-400 transition-colors font-bold">Home</a>
        <a href="planets.html" class="font-heading text-sm text-gray-300 hover:text-purple-400 transition-colors font-bold">Planets</a>
        <a href="quiz.html"    class="nav-link-active font-heading text-sm font-bold" aria-current="page">Quiz</a>
        <a href="about.html"   class="font-heading text-sm text-gray-300 hover:text-purple-400 transition-colors font-bold">About</a>
        <button class="dark-mode-toggle text-xl hover:scale-110 transition-transform" aria-label="Toggle dark/light mode">☀️</button>
      </div>

      <div class="flex md:hidden items-center gap-3">
        <button class="dark-mode-toggle text-xl" aria-label="Toggle dark/light mode">☀️</button>
        <button id="hamburger-btn" class="flex flex-col gap-1.5 p-2" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-menu">
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden pb-4 px-2">
      <div class="glass-card p-4 mt-2 flex flex-col gap-3">
        <a href="index.html"   class="font-heading text-sm text-gray-300 hover:text-purple-400 transition-colors">Home</a>
        <a href="planets.html" class="font-heading text-sm text-gray-300 hover:text-purple-400 transition-colors">Planets</a>
        <a href="quiz.html"    class="nav-link-active font-heading text-sm font-bold" aria-current="page">Quiz</a>
        <a href="about.html"   class="font-heading text-sm text-gray-300 hover:text-purple-400 transition-colors">About</a>
      </div>
    </div>
  </nav>

  <!-- ======================================================
       MAIN — quiz centred vertically
  ====================================================== -->
  <main class="min-h-screen flex flex-col items-center justify-center px-4 py-28">
    <div class="w-full max-w-2xl">

      <!-- Page header -->
      <header class="text-center mb-10">
        <div class="inline-block text-5xl mb-4" aria-hidden="true">🧠</div>
        <h1 class="font-heading text-3xl md:text-4xl font-black text-white glow-heading mb-3">Space Quiz</h1>
        <p class="text-gray-400">10 questions to test your cosmic knowledge. Can you score 100%?</p>
      </header>

      <!-- Quiz question container — populated by script.js showQuestion() -->
      <div id="quiz-container" class="glass-card p-6 md:p-8" aria-live="polite">
        <p class="text-center text-gray-500 py-8 font-heading">Loading quiz…</p>
      </div>

      <!-- Results container — populated by script.js showResults() -->
      <div id="results-container" class="glass-card p-6 md:p-8 hidden" aria-live="polite">
        <!-- Populated dynamically -->
      </div>

    </div>
  </main>

  <!-- ======================================================
       FOOTER
  ====================================================== -->
  <footer class="border-t border-purple-900/30 py-10 px-4 md:px-8" role="contentinfo">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="text-center md:text-left">
        <div class="font-heading font-black text-lg mb-1">
          <span class="glow-accent">Space</span><span class="text-purple-400">Explorer</span>
        </div>
        <p class="text-gray-600 text-xs">Charting the cosmos, one planet at a time.</p>
      </div>
      <nav aria-label="Footer navigation">
        <div class="flex gap-6 text-sm font-heading">
          <a href="index.html"   class="text-gray-500 hover:text-purple-400 transition-colors">Home</a>
          <a href="planets.html" class="text-gray-500 hover:text-purple-400 transition-colors">Planets</a>
          <a href="quiz.html"    class="text-gray-500 hover:text-purple-400 transition-colors">Quiz</a>
          <a href="about.html"   class="text-gray-500 hover:text-purple-400 transition-colors">About</a>
        </div>
      </nav>
      <p class="text-gray-700 text-xs">© 2025 Space Explorer. All rights reserved.</p>
    </div>
  </footer>

  <button id="scrollToTop" aria-label="Scroll to top of page">▲</button>
  <script src="script.js"></script>
</body>
</html>
